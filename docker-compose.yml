services:

  postgres:
    image: postgres:17
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL",
        "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7
    restart: unless-stopped

    command: redis-server --save 60 1

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  bot:
    build: .

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DB_URL_POSTGRES}

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - backend

    volumes:
      - .:/app

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  market_worker:
    build: .

    command: python -m ProjectDataBase.market_data_worker

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DB_URL_POSTGRES}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend

    volumes:
      - .:/app

    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge