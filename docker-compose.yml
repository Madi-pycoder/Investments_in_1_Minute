services:

  bot:
    build: .
    container_name: investments_in_1_minute

    restart: always

    env_file:
      - .env

    depends_on:
      - redis

  redis:
    image: redis:7

    container_name: redis

    restart: always


  postgres:
    image: postgres:17

    restart: always

    environment:
      POSTGRES_DB: investai
      POSTGRES_USER:
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"