[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --asyncio-mode=auto
    --asyncio-default-loop-selector
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    market: Market data tests
    database: Database tests
    shariah: Shariah compliance tests
    risk: Risk calculation tests
    portfolio: Portfolio management tests
asyncio_mode = auto